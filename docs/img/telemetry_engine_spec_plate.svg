<svg viewBox="0 0 720 400" width="720" height="400" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181b20"/>
      <stop offset="0.5" stop-color="#121418"/>
      <stop offset="1" stop-color="#0e1013"/>
    </linearGradient>
    <linearGradient id="brush" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- plate body -->
  <rect x="8" y="8" width="704" height="384" rx="10" fill="url(#plate)" stroke="#454a52" stroke-width="1.5"/>
  <rect x="8" y="8" width="704" height="384" rx="10" fill="url(#brush)"/>
  <!-- engraved inner hairline -->
  <rect x="30" y="30" width="660" height="340" fill="none" stroke="#6e5a2c" stroke-width="1" opacity="0.7"/>

  <!-- corner rivets -->
  <g>
    <g transform="translate(22,22)"><circle r="6" fill="#23262c" stroke="#3d424a" stroke-width="1"/><circle cx="-1.5" cy="-1.5" r="1.8" fill="#4a505a"/></g>
    <g transform="translate(698,22)"><circle r="6" fill="#23262c" stroke="#3d424a" stroke-width="1"/><circle cx="-1.5" cy="-1.5" r="1.8" fill="#4a505a"/></g>
    <g transform="translate(22,378)"><circle r="6" fill="#23262c" stroke="#3d424a" stroke-width="1"/><circle cx="-1.5" cy="-1.5" r="1.8" fill="#4a505a"/></g>
    <g transform="translate(698,378)"><circle r="6" fill="#23262c" stroke="#3d424a" stroke-width="1"/><circle cx="-1.5" cy="-1.5" r="1.8" fill="#4a505a"/></g>
  </g>

  <!-- header strip -->
  <text x="360" y="56" text-anchor="middle" font-size="10" letter-spacing="3" fill="#8a7440">SHIPBOARD EQUIPMENT PLACARD &#183; DO NOT REMOVE &#183; DO NOT DISABLE</text>
  <line x1="48" y1="68" x2="672" y2="68" stroke="#6e5a2c" stroke-width="1" opacity="0.6"/>

  <!-- designation block -->
  <text x="52" y="126" font-size="38" font-weight="bold" letter-spacing="2" fill="#ffb000">TELEMETRY ENGINE</text>
  <g>
    <rect x="560" y="88" width="110" height="52" fill="none" stroke="#8a7440" stroke-width="1.2"/>
    <text x="615" y="102" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8a7440">MODEL</text>
    <text x="615" y="128" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffb000">TLM/7</text>
  </g>
  <text x="52" y="158" font-size="13" letter-spacing="4" fill="#d8a24a">SHIPBOARD ADJUDICATION &amp; RECORDS SYSTEM</text>

  <line x1="48" y1="182" x2="672" y2="182" stroke="#6e5a2c" stroke-width="1" opacity="0.6"/>

  <!-- certification block -->
  <text x="52" y="210" font-size="11" letter-spacing="2" fill="#b08a45">CERTIFIED FOR CONTINUOUS OPERATION</text>
  <text x="52" y="230" font-size="11" letter-spacing="2" fill="#b08a45">ALL OUTPUTS ADMISSIBLE IN CONFRONTATION PROCEEDINGS</text>
  <text x="52" y="250" font-size="11" letter-spacing="2" fill="#b08a45">FIT: ALL PILLARS &#8212; TRD / EXP / WAR</text>

  <!-- tagline -->
  <line x1="52" y1="278" x2="52" y2="304" stroke="#ffb000" stroke-width="3"/>
  <text x="64" y="297" font-size="17" font-weight="bold" letter-spacing="2" fill="#ffb000">&#8220;EVERYTHING IS ON THE RECORD.&#8221;</text>

  <line x1="48" y1="324" x2="672" y2="324" stroke="#6e5a2c" stroke-width="1" opacity="0.6"/>

  <!-- bottom data row: punched serial -->
  <text x="52" y="352" font-size="10" letter-spacing="2" fill="#8a7440">SER. NO.</text>
  <g font-size="13" font-weight="bold" fill="#e8c06a">
    <rect x="122" y="338" width="18" height="20" fill="none" stroke="#5a4a24" stroke-width="1"/><text x="131" y="353" text-anchor="middle">1</text>
    <rect x="142" y="338" width="18" height="20" fill="none" stroke="#5a4a24" stroke-width="1"/><text x="151" y="353" text-anchor="middle">5</text>
    <rect x="162" y="338" width="18" height="20" fill="none" stroke="#5a4a24" stroke-width="1"/><text x="171" y="353" text-anchor="middle">4</text>
    <rect x="182" y="338" width="18" height="20" fill="none" stroke="#5a4a24" stroke-width="1"/><text x="191" y="353" text-anchor="middle">0</text>
    <rect x="202" y="338" width="18" height="20" fill="none" stroke="#5a4a24" stroke-width="1"/><text x="211" y="353" text-anchor="middle">0</text>
    <rect x="222" y="338" width="18" height="20" fill="none" stroke="#5a4a24" stroke-width="1"/><text x="231" y="353" text-anchor="middle">0</text>
  </g>
  <text x="268" y="352" font-size="10" letter-spacing="2" fill="#8a7440">REV 0.1 &#183; MAGGIE-COMPATIBLE</text>

  <!-- inspection stamp -->
  <g transform="translate(598,300) rotate(-11)" opacity="0.88">
    <circle r="42" fill="none" stroke="#c2564a" stroke-width="2.5"/>
    <circle r="34" fill="none" stroke="#c2564a" stroke-width="1"/>
    <text x="0" y="-14" text-anchor="middle" font-size="9" letter-spacing="2" fill="#c2564a">INSPECTED</text>
    <text x="0" y="5" text-anchor="middle" font-size="14" font-weight="bold" letter-spacing="1" fill="#c2564a">PASSED</text>
    <text x="0" y="22" text-anchor="middle" font-size="8" letter-spacing="2" fill="#c2564a">M.A.G.G.I.E.</text>
  </g>
</svg>
