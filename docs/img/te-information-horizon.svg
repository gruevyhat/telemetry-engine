<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs><pattern id="hex" width="52" height="90" patternUnits="userSpaceOnUse"><path d="M26 1l25 15v29L26 60 1 45V16zM26 61l25 15v14M1 90V76l25-15" fill="none" stroke="#313744" stroke-width="1"/></pattern></defs>
  <rect width="940" height="400" fill="#0f1117"/><rect x="20" y="50" width="590" height="310" fill="url(#hex)"/><text x="470" y="31" text-anchor="middle" font-size="17" font-weight="700" fill="#e8ecf3">THE INFORMATION HORIZON</text>
  <g transform="translate(304 205)" fill="none"><circle r="38" stroke="#7ee2a8" stroke-width="2"/><circle r="86" stroke="#9fd0ff" stroke-width="2"/><circle r="150" stroke="#f0c674" stroke-width="2" stroke-dasharray="7 5"/><circle r="7" fill="#ffb000" stroke="#ffb000"/></g>
  <g font-size="12" font-weight="700"><text x="313" y="183" fill="#ffb000">YOUR SHIP</text><text x="350" y="202" fill="#7ee2a8">1 parsec · 1w old</text><text x="380" y="143" fill="#9fd0ff">2 parsecs · 2w old</text><text x="419" y="84" fill="#f0c674">4 parsecs · at least 4w old</text></g>
  <path d="M615 72h296v266H615z" fill="#161a22" stroke="#3a3f4b"/><text x="638" y="103" font-size="13" font-weight="700" fill="#f0c674">REMOTE MARKET FEED</text><text x="638" y="139" font-family="monospace" font-size="18" fill="#ffb000">REGINA GRAIN</text><text x="638" y="166" font-family="monospace" font-size="22" fill="#e8ecf3">Cr4,400 / ton</text><rect x="638" y="186" width="126" height="29" rx="14" fill="#332a17" stroke="#e0a94c"/><text x="701" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#f0c674">4 WEEKS OLD</text>
  <text x="638" y="250" font-size="12" fill="#c9d1da">Prices may have moved.</text><text x="638" y="272" font-size="12" fill="#c9d1da">Wars may have ended.</text><text x="638" y="294" font-size="12" fill="#c9d1da">The patron may be dead.</text><text x="638" y="325" font-size="12" font-weight="700" fill="#ff9a9a">Distance is uncertainty.</text>
  <text x="470" y="385" text-anchor="middle" font-size="12" fill="#8f96a3">News travels by ship. Add at least one week of staleness for every parsec between you and the source.</text>
</svg>
