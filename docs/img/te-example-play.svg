<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 350" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="940" height="350" fill="#0f1117"/><text x="470" y="31" text-anchor="middle" font-size="17" font-weight="700" fill="#e8ecf3">THE SKIM · THREE RECORDS, ONE BAD CONCLUSION</text><g stroke="#3a3f4b"><rect x="24" y="55" width="280" height="250" rx="10" fill="#332a17"/><rect x="330" y="55" width="280" height="250" rx="10" fill="#1a2233"/><rect x="636" y="55" width="280" height="250" rx="10" fill="#331a1a"/></g>
  <g text-anchor="middle"><text x="164" y="84" font-size="14" font-weight="700" fill="#f0c674">1 · THE GAP</text><g fill="#8a7440"> <rect x="70" y="112" width="38" height="38"/><rect x="116" y="112" width="38" height="38"/><rect x="162" y="112" width="38" height="38"/><rect x="208" y="112" width="38" height="38"/></g><path d="M70 168h176" stroke="#e05c5c" stroke-width="4" stroke-dasharray="18 8"/><text x="164" y="203" font-size="26" font-weight="700" fill="#e8ecf3">20 → 18</text><text x="164" y="232" font-size="12" fill="#c9d1da">manifest and payment disagree</text><text x="164" y="268" font-size="12" font-weight="700" fill="#ff9a9a">CONFRONTATION OPENS</text>
  <text x="470" y="84" font-size="14" font-weight="700" fill="#9fd0ff">2 · THE TRACE</text><path d="M395 113h150v78H395z" fill="#101820" stroke="#4a9eff"/><path d="M412 132h116m-116 17h82m-82 17h103" stroke="#9fd0ff"/><circle cx="548" cy="190" r="23" fill="#25203a" stroke="#c77dff"/><path d="M536 190l8 8 17-20" fill="none" stroke="#d9a9ff" stroke-width="3"/><text x="470" y="228" font-size="12" fill="#c9d1da">bay cycled · camera looped</text><text x="470" y="250" font-size="12" fill="#c9d1da">valid code · actor still unknown</text><text x="470" y="280" font-size="12" font-weight="700" fill="#9fd0ff">EVIDENCE IS NOT A VERDICT</text>
  <text x="776" y="84" font-size="14" font-weight="700" fill="#ff9a9a">3 · THE PRICE</text><path d="M706 116h140v92H706z" fill="#f0e4c3" stroke="#e05c5c"/><path d="M706 116l70 55 70-55" fill="none" stroke="#e05c5c"/><path d="M776 116v92" stroke="#e05c5c" stroke-dasharray="4 4"/><text x="776" y="235" font-size="24" font-weight="700" fill="#e8ecf3">LOYAL</text><text x="776" y="259" font-size="12" fill="#c9d1da">objective forfeited</text><text x="776" y="282" font-size="12" font-weight="700" fill="#ff9a9a">ACCUSATION UNFOUNDED</text></g>
  <path d="M304 180h26m280 0h26" stroke="#9aa4b2" stroke-width="2"/><text x="470" y="330" text-anchor="middle" font-size="12" fill="#8f96a3">The universe caused the loss. The crew supplied the tragedy.</text>
