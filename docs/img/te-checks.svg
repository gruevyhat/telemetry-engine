<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="940" height="300" fill="#0f1117"/><text x="470" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#e8ecf3">ONE RULE FOR EVERY UNCERTAIN ACTION</text>
  <g transform="translate(36 62)"><rect width="190" height="140" rx="10" fill="#1a2233" stroke="#4a9eff"/><text x="95" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#9fd0ff">ROLL 2D6</text><g fill="#e8ecf3"><rect x="45" y="48" width="42" height="42" rx="6"/><rect x="103" y="48" width="42" height="42" rx="6"/></g><text x="95" y="121" text-anchor="middle" font-size="28" font-weight="700" fill="#e8ecf3">5 + 6 = 11</text></g>
  <text x="247" y="142" font-size="28" fill="#8f96a3">+</text><g transform="translate(282 62)"><rect width="150" height="140" rx="10" fill="#16301f" stroke="#4caf7d"/><text x="75" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#7ee2a8">ADD SKILL</text><text x="75" y="92" text-anchor="middle" font-size="50" font-weight="700" fill="#e8ecf3">+1</text><text x="75" y="120" text-anchor="middle" font-size="12" fill="#c9d1da">Computers 1</text></g>
  <text x="454" y="142" font-size="28" fill="#8f96a3">vs.</text><g transform="translate(505 62)"><rect width="150" height="140" rx="10" fill="#332a17" stroke="#e0a94c"/><text x="75" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#f0c674">DIFFICULTY</text><text x="75" y="92" text-anchor="middle" font-size="50" font-weight="700" fill="#e8ecf3">8</text><text x="75" y="120" text-anchor="middle" font-size="12" fill="#c9d1da">standard</text></g>
  <text x="674" y="142" font-size="28" fill="#8f96a3">→</text><g transform="translate(718 62)"><rect width="186" height="140" rx="10" fill="#25203a" stroke="#c77dff"/><text x="93" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#d9a9ff">EFFECT</text><text x="93" y="78" text-anchor="middle" font-size="29" font-weight="700" fill="#e8ecf3">12 − 8 = +4</text><text x="93" y="106" text-anchor="middle" font-size="12" fill="#c9d1da">cleaner result</text><text x="93" y="125" text-anchor="middle" font-size="12" fill="#c9d1da">better price · less harm</text></g>
  <rect x="155" y="231" width="630" height="40" rx="20" fill="#331a1a" stroke="#e05c5c"/><text x="470" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#ff9a9a">MISS THE DIFFICULTY → THE STORY MOVES, AND TIME PAYS THE DIFFERENCE</text>
</svg>
